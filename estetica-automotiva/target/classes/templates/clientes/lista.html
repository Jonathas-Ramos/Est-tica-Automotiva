<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: topbar}"></div>
<main>
    <section class="panel">
        <h1>Gestao de clientes</h1>
        <p class="muted">CPF e telefone aparecem parcialmente anonimizados na listagem.</p>
        <table>
            <thead>
            <tr><th>Nome</th><th>CPF</th><th>Telefone</th><th>E-mail</th><th>Placas</th><th>Acoes</th></tr>
            </thead>
            <tbody>
            <tr th:each="cliente : ${clientes}">
                <td th:text="${cliente.nome}"></td>
                <td th:text="${cliente.cpfParcial()}"></td>
                <td th:text="${cliente.telefoneParcial()}"></td>
                <td th:text="${cliente.email}"></td>
                <td th:text="${#strings.listJoin(cliente.placas, ', ')}"></td>
                <td>
                    <form th:action="@{/clientes/{id}/excluir(id=${cliente.id})}" method="post" style="display:inline">
                        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
                        <button class="danger" type="submit" onclick="return confirm('Excluir definitivamente este cliente?')">Excluir</button>
                    </form>
                </td>
            </tr>
            </tbody>
        </table>
    </section>
</main>
</body>
</html>
