<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agendamento</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div th:replace="~{fragments/header :: topbar}"></div>
<main class="panel">
    <h1>Agendamento de servico</h1>
    <p class="error" th:if="${erro}" th:text="${erro}"></p>
    <form th:action="${agendamento == null} ? @{/agendamentos} : (${gestor} ? @{/gestor/agendamentos/{id}/editar(id=${agendamento.id})} : @{/agendamentos/{id}/editar(id=${agendamento.id})})" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label>Cliente</label>
        <input th:value="${cliente.nome}" disabled>
        <label>Tipo de servico</label>
        <select name="tipoServicoId" required>
            <option th:each="servico : ${servicos}"
                    th:value="${servico.id}"
                    th:selected="${agendamento != null and agendamento.tipoServicoId == servico.id}"
                    th:text="${servico.nome + ' - R$ ' + servico.preco + ' (' + servico.duracaoMinutos + ' min)'}"></option>
        </select>
        <label>Placa do veiculo</label>
        <select name="placaVeiculo" required>
            <option th:each="placa : ${cliente.placas}"
                    th:value="${placa}"
                    th:selected="${agendamento != null and agendamento.placaVeiculo == placa}"
                    th:text="${placa}"></option>
        </select>
        <label>Data e hora</label>
        <input name="dataHoraInicio" type="datetime-local" required
               th:min="${#temporals.format(dataHoraMin, 'yyyy-MM-dd''T''HH:mm')}"
               th:value="${agendamento == null ? '' : #temporals.format(agendamento.dataHoraInicio, 'yyyy-MM-dd''T''HH:mm')}">
        <label>Observacoes</label>
        <textarea name="observacoes" th:text="${agendamento == null ? '' : agendamento.observacoes}"></textarea>
        <div class="actions">
            <button type="submit">Salvar</button>
            <a class="btn secondary" th:href="${gestor} ? @{/gestor/agenda} : @{/agendamentos}">Cancelar</a>
        </div>
    </form>
</main>
</body>
</html>
