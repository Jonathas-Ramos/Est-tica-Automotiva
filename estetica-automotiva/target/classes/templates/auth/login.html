<!doctype html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Estetica Automotiva</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<main class="auth panel">
    <h1>Login</h1>
    <p class="success" th:if="${param.cadastro}">Cadastro realizado. Entre com seu e-mail e senha.</p>
    <p class="error" th:if="${param.error}">E-mail ou senha invalidos.</p>
    <p class="success" th:if="${param.logout}">Sessao encerrada.</p>
    <form th:action="@{/login}" method="post">
        <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
        <label for="username">E-mail</label>
        <input id="username" name="username" type="email" required autofocus>
        <label for="password">Senha</label>
        <input id="password" name="password" type="password" required>
        <div class="actions">
            <button type="submit">Entrar</button>
            <a class="btn secondary" th:href="@{/cadastro}">Criar cadastro</a>
        </div>
    </form>
    <p class="muted">Gestor inicial: gestor@estetica.com / admin123. Altere por variaveis de ambiente em producao.</p>
</main>
</body>
</html>
